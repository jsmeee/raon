<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LokalGuide</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    
        .author-wrapper {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .author-card {
            background: lightblue;
            width: 100%;
            max-width: 400px;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .author-card h2 {
            color: #003366;
            margin-bottom: 10px;
            text-align: center;
        }

        .author-card p {
            color: #7f8c8d;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #e67e22;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #003366;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #e67e22;
        }

        .author-switch {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #2c3e50;
        }
        
</style>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Lokal<span>Guide</span></a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="guide.html">Find a Guide</a></li>
                <li><a href="aboutus.html">About Us</a></li>
                <li><a href="dashboard.html">User Dashboard</a></li>
                <li><a href="login.html" class="btn-login">Log In</a></li>
                <li><a href="signup.html" class="btn-signup active">Sign Up</a></li>

            </ul>
        </div>
    </nav>

    <main class="author-wrapper">
        <div class="author-card">
            <h2>Create Account</h2>
            <p>Join us today to explore Malaysia like a local!</p>
            
            <form action="index.html" method="GET">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="confirmpassword">Confirm Password</label>
                    <input type="password" id="confirmpassword" placeholder="Repeat your password" required>
                </div>
                
                <button type="submit" class="btn-submit">Sign Up</button>
            </form>
            
        </div>
    </main>
    <footer>
        <p>&copy; 2026 LokalGuide Project Group 11. BIW20303 Web Design</p>
    </footer>

</body>
</html>
